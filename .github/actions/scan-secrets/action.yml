name: Secret Scanning — Gitleaks
description: "Détecte les secrets exposés dans l'historique Git."

runs:
  using: composite
  steps:

    - name: Gitleaks · scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN:    ${{ github.token }}
        GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}
