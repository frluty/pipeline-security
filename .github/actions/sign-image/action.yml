name: Sign Image — Cosign
description: "Signe l'image Docker avec Cosign (keyless OIDC ou keypair)."

inputs:
  image_uri:
    description: "URI complète de l'image (name@sha256:...)"
    required: true
  signing_mode:
    description: "keyless | keypair"
    default: "keyless"
  cosign_private_key:
    description: "Clé privée Cosign (mode keypair uniquement)"
    default: ""
  cosign_password:
    description: "Mot de passe de la clé privée (mode keypair uniquement)"
    default: ""

runs:
  using: composite
  steps:

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign · keyless (OIDC)
      if: inputs.signing_mode == 'keyless'
      shell: bash
      run: cosign sign --yes "${{ inputs.image_uri }}"

    - name: Sign · keypair
      if: inputs.signing_mode == 'keypair'
      shell: bash
      env:
        COSIGN_PRIVATE_KEY: ${{ inputs.cosign_private_key }}
        COSIGN_PASSWORD:    ${{ inputs.cosign_password }}
      run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${{ inputs.image_uri }}"
