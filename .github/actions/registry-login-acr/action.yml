name: Registry Login — ACR
description: "Authentification à Azure Container Registry via service principal."

inputs:
  registry_url:
    description: "Hostname du registre ACR (ex: myregistry.azurecr.io)"
    required: true
  client_id:
    required: true
  client_secret:
    required: true
  tenant_id:
    required: true
  subscription_id:
    required: false
    default: ""

runs:
  using: composite
  steps:

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: >-
          {
            "clientId":       "${{ inputs.client_id }}",
            "clientSecret":   "${{ inputs.client_secret }}",
            "tenantId":       "${{ inputs.tenant_id }}",
            "subscriptionId": "${{ inputs.subscription_id }}"
          }

    - name: ACR Login
      shell: bash
      run: az acr login --name "${{ inputs.registry_url }}"
